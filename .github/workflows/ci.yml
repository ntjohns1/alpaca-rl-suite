name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Node/TypeScript services ───────────────────────────────────────
  node-checks:
    name: Node lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Lint all packages
        run: pnpm -r lint

      - name: Run tests
        run: pnpm -r test

  # ─── Python services ────────────────────────────────────────────────
  python-checks:
    name: Python lint + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backtest, dashboard, dataset-builder, feature-builder, kaggle-orchestrator, rl-train]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Lint with ruff
        run: ruff check services/${{ matrix.service }}/

      - name: Run tests
        run: |
          if [ -d "services/${{ matrix.service }}/tests" ]; then
            pytest services/${{ matrix.service }}/tests/ -v
          else
            echo "No tests directory found for ${{ matrix.service }}, skipping"
          fi

  python-lint-only:
    name: Python lint only
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [rl-infer, temporal-worker, web-ui]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check services/${{ matrix.service }}/

  # ─── Phase 2: Column alignment contract suite ───────────────────────
  column-alignment:
    name: Phase 2 column-alignment contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          pip install pytest numpy pandas pyarrow scikit-learn ta

      - name: Run phase 2 contract tests
        run: pytest tests/functional/test_pipeline_column_alignment.py -q
  # ─── Docker build validation ─────────────────────────────────────────
  docker-compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Validate integration docker-compose config
        run: docker compose -f tests/integration/docker-compose.test.yml config --quiet
