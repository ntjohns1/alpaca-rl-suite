name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  # ─── Node/TypeScript services ───────────────────────────────────────
  node-checks:
    name: Node lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -r --filter './packages/**' build

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Lint all packages
        run: pnpm -r lint

      - name: Run tests
        run: pnpm -r test

  # ─── Python services ────────────────────────────────────────────────
  python-checks:
    name: Python lint + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backtest, dashboard, dataset-builder, feature-builder, kaggle-orchestrator, rl-train]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Lint with ruff
        run: ruff check services/${{ matrix.service }}/

      - name: Run tests
        run: |
          if [ -d "services/${{ matrix.service }}/tests" ]; then
            pytest services/${{ matrix.service }}/tests/ -v
          else
            echo "No tests directory found for ${{ matrix.service }}, skipping"
          fi

  python-lint-only:
    name: Python lint only
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [rl-infer, temporal-worker, web-ui]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check services/${{ matrix.service }}/

  # ─── Phase 2: Column alignment contract suite ───────────────────────
  column-alignment:
    name: Phase 2 column-alignment contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          pip install pytest numpy pandas pyarrow scikit-learn ta gymnasium requests

      - name: Run phase 2 contract tests
        run: pytest tests/functional/test_pipeline_column_alignment.py -q
  # ─── GHCR build & push (on merge to main only) ──────────────────────
  ghcr-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [node-checks, python-checks, python-lint-only, column-alignment]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # Node.js services (repo-root context)
          - service: auth
            context: .
            dockerfile: services/auth/Dockerfile
          - service: alpaca-adapter
            context: .
            dockerfile: services/alpaca-adapter/Dockerfile
          - service: market-ingest
            context: .
            dockerfile: services/market-ingest/Dockerfile
          - service: orders
            context: .
            dockerfile: services/orders/Dockerfile
          - service: risk
            context: .
            dockerfile: services/risk/Dockerfile
          - service: portfolio
            context: .
            dockerfile: services/portfolio/Dockerfile
          - service: strategy-runner
            context: .
            dockerfile: services/strategy-runner/Dockerfile
          - service: api-gateway
            context: .
            dockerfile: services/api-gateway/Dockerfile
          # Python services (repo-root context)
          - service: feature-builder
            context: .
            dockerfile: services/feature-builder/Dockerfile
          - service: dataset-builder
            context: .
            dockerfile: services/dataset-builder/Dockerfile
          - service: rl-train
            context: .
            dockerfile: services/rl-train/Dockerfile
          # Python services (self context)
          - service: backtest
            context: services/backtest
            dockerfile: services/backtest/Dockerfile
          - service: rl-infer
            context: services/rl-infer
            dockerfile: services/rl-infer/Dockerfile
          - service: temporal-worker
            context: services/temporal-worker
            dockerfile: services/temporal-worker/Dockerfile
          - service: kaggle-orchestrator
            context: services/kaggle-orchestrator
            dockerfile: services/kaggle-orchestrator/Dockerfile
          - service: dashboard
            context: services/dashboard
            dockerfile: services/dashboard/Dockerfile
          - service: web-ui
            context: services/web-ui
            dockerfile: services/web-ui/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/ntjohns1/alpaca-rl-suite/${{ matrix.service }}:latest
            ghcr.io/ntjohns1/alpaca-rl-suite/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Docker build validation ─────────────────────────────────────────
  docker-compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Validate integration docker-compose config
        run: docker compose -f tests/integration/docker-compose.test.yml config --quiet

      - name: Validate Swarm stack config
        run: |
          # docker-stack.yml uses Swarm-only deploy keys (update_config.order,
          # rollback_config) that may not validate on all docker compose versions
          docker compose -f infra/docker-stack.yml config --quiet || \
            echo "::warning::docker-stack.yml validation failed — expected for Swarm-only keys on some Docker Compose versions"
