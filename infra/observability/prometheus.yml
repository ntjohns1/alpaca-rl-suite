global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'

  - job_name: 'auth'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/metrics'

  - job_name: 'alpaca-adapter'
    static_configs:
      - targets: ['host.docker.internal:3002']
    metrics_path: '/metrics'

  - job_name: 'market-ingest'
    static_configs:
      - targets: ['host.docker.internal:3003']
    metrics_path: '/metrics'

  - job_name: 'portfolio'
    static_configs:
      - targets: ['host.docker.internal:3004']
    metrics_path: '/metrics'

  - job_name: 'orders'
    static_configs:
      - targets: ['host.docker.internal:3005']
    metrics_path: '/metrics'

  - job_name: 'risk'
    static_configs:
      - targets: ['host.docker.internal:3006']
    metrics_path: '/metrics'

  - job_name: 'strategy-runner'
    static_configs:
      - targets: ['host.docker.internal:3007']
    metrics_path: '/metrics'

  - job_name: 'backtest'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/metrics'

  - job_name: 'feature-builder'
    static_configs:
      - targets: ['host.docker.internal:8002']
    metrics_path: '/metrics'

  - job_name: 'rl-train'
    static_configs:
      - targets: ['host.docker.internal:8004']
    metrics_path: '/metrics'

  - job_name: 'rl-infer'
    static_configs:
      - targets: ['host.docker.internal:8005']
    metrics_path: '/metrics'

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: '/metrics'
