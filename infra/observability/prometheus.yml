global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  # ─── Node.js trading services (server_6: role=trading) ────────────────
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: '/metrics'

  - job_name: 'auth'
    static_configs:
      - targets: ['auth:3001']
    metrics_path: '/metrics'

  - job_name: 'alpaca-adapter'
    static_configs:
      - targets: ['alpaca-adapter:3002']
    metrics_path: '/metrics'

  - job_name: 'market-ingest'
    static_configs:
      - targets: ['market-ingest:3003']
    metrics_path: '/metrics'

  - job_name: 'orders'
    static_configs:
      - targets: ['orders:3004']
    metrics_path: '/metrics'

  - job_name: 'risk'
    static_configs:
      - targets: ['risk:3005']
    metrics_path: '/metrics'

  - job_name: 'portfolio'
    static_configs:
      - targets: ['portfolio:3006']
    metrics_path: '/metrics'

  - job_name: 'strategy-runner'
    static_configs:
      - targets: ['strategy-runner:3007']
    metrics_path: '/metrics'

  # ─── Python ML services (server_5: role=compute) ──────────────────────
  - job_name: 'backtest'
    static_configs:
      - targets: ['backtest:8001']
    metrics_path: '/metrics'

  - job_name: 'feature-builder'
    static_configs:
      - targets: ['feature-builder:8002']
    metrics_path: '/metrics'

  - job_name: 'rl-train'
    static_configs:
      - targets: ['rl-train:8004']
    metrics_path: '/metrics'

  - job_name: 'rl-infer'
    static_configs:
      - targets: ['rl-infer:8005']
    metrics_path: '/metrics'

  # ─── Infrastructure (server_1: role=data) ─────────────────────────────
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: '/metrics'
