global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@alpaca-rl.local'
  smtp_auth_username: ''
  smtp_auth_password: ''

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        alertname: KillSwitchActive
      receiver: 'kill-switch'
      group_wait: 0s
      repeat_interval: 5m

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:9093/hook'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://localhost:9093/hook'
        send_resolved: true

  - name: 'kill-switch'
    webhook_configs:
      - url: 'http://localhost:9093/hook'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
