    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PORTFOLIO_PORT: "3006"
    ports:
      - "3006:3006"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == trading
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
