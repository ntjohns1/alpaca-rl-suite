  rl-infer:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/rl-infer:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpaca-rl-artifacts
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
