# Docker Swarm stack file for 3-node deployment
# Deploy with: docker stack deploy -c docker-stack.yml alpaca-rl
#
# Node labels required:
#   server_1 (192.168.10.104): role=data     (Swarm Manager)
#   server_7 (192.168.10.113): role=compute  (Swarm Worker)
#   server_6 (192.168.10.105): role=trading  (Swarm Worker)
#
# Preserve infra/docker-compose.yml for local dev — this file is Swarm-only.

version: "3.8"

services:
  # ═══════════════════════════════════════════════════════════════════════
  # DATA NODE — server_1 (role=data)
  # ═══════════════════════════════════════════════════════════════════════

  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${DB_USER:-rl_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-alpaca_rl}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == data
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
      restart_policy:
        condition: any

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == data
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
      restart_policy:
        condition: any

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == data
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      restart_policy:
        condition: any

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=rl_user
      - POSTGRES_PWD=${DB_PASSWORD}
      - POSTGRES_SEEDS=postgres
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == data
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: any

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == data
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: any

  # ═══════════════════════════════════════════════════════════════════════
  # TRADING NODE — server_6 (role=trading)
  # ═══════════════════════════════════════════════════════════════════════

  auth:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/auth:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      KEYCLOAK_URL: https://auth.nelsonjohns.com
      KEYCLOAK_REALM: admin
      KEYCLOAK_CLIENT_ID: alpaca-rl-web-ui
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      AUTH_PORT: "3001"
    ports:
      - "3001:3001"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == trading
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  alpaca-adapter:
