    ports:
      - "3004:3004"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == trading
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  risk:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/risk:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      NATS_URL: nats://nats:4222
      MAX_DAILY_LOSS_USD: "1000"
      MAX_POSITION_SIZE_PCT: "0.10"
      KILL_SWITCH_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
