        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  strategy-runner:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/strategy-runner:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
