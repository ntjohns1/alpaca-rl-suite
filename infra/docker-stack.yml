  dashboard:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/dashboard:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      KAGGLE_SERVICE_URL: http://kaggle-orchestrator:8011
      BACKTEST_SERVICE_URL: http://backtest:8001
      RL_TRAIN_SERVICE_URL: http://rl-train:8004
      DATASET_SERVICE_URL: http://dataset-builder:8003
      DASHBOARD_PORT: "8020"
    ports:
      - "8020:8020"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == trading
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  # ═══════════════════════════════════════════════════════════════════════
  # COMPUTE + OBSERVABILITY NODE — server_7 (role=compute)
  # ═══════════════════════════════════════════════════════════════════════

  feature-builder:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/feature-builder:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      FEATURE_BUILDER_PORT: "8002"
    ports:
      - "8002:8002"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  dataset-builder:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/dataset-builder:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpaca-rl-artifacts
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      DATASET_BUILDER_PORT: "8003"
    ports:
      - "8003:8003"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  backtest:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/backtest:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpaca-rl-artifacts
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      BACKTEST_PORT: "8001"
    ports:
      - "8001:8001"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
