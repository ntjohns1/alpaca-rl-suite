    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  temporal-worker:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/temporal-worker:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: alpaca-rl-main
      RL_TRAIN_URL: http://rl-train:8004
      BACKTEST_URL: http://backtest:8001
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "8010:8010"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == data
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  kaggle-orchestrator:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/kaggle-orchestrator:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpaca-rl-artifacts
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      KAGGLE_ORCHESTRATOR_PORT: "8011"
    ports:
      - "8011:8011"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  # ─── Observability (role=compute / server_7) ──────────────────────────

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus-alerts
        target: /etc/prometheus/alerts.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
      restart_policy:
        condition: any

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    configs:
      - source: alertmanager-config
        target: /etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 128M
      restart_policy:
        condition: any

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
      restart_policy:
        condition: any

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    configs:
      - source: otel-config
        target: /etc/otelcol-contrib/config.yaml
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
      resources:
        limits:
          memory: 256M
      restart_policy:
        condition: any

# ═══════════════════════════════════════════════════════════════════════
# Networks, Volumes, Secrets, Configs
# ═══════════════════════════════════════════════════════════════════════

networks:
  backend:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

configs:
  prometheus-config:
    file: ./observability/prometheus.yml
  prometheus-alerts:
    file: ./observability/alerts.yml
  alertmanager-config:
    file: ./observability/alertmanager.yml
  otel-config:
    file: ./observability/otel-collector.yml
