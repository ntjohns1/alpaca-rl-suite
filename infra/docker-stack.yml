    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpaca-rl-artifacts
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      RL_TRAIN_PORT: "8004"
    ports:
      - "8004:8004"
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == compute
