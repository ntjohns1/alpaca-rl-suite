        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  market-ingest:
    image: ghcr.io/ntjohns1/alpaca-rl-suite/market-ingest:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rl_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-alpaca_rl}
      NATS_URL: nats://nats:4222
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_DATA_URL: https://data.alpaca.markets
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      MARKET_INGEST_PORT: "3003"
    ports:
      - "3003:3003"
    networks:
      - backend
    deploy:
      placement:
