services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: alpaca_rl_postgres_test
    environment:
      POSTGRES_USER: rl_user
      POSTGRES_PASSWORD: rl_pass
      POSTGRES_DB: alpaca_rl
    ports:
      - "15432:5432"
    volumes:
      - ../../infra/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ../../infra/migrations/002_sharadar.sql:/docker-entrypoint-initdb.d/02_sharadar.sql
      - ../../infra/migrations/003_feature_row_sharadar.sql:/docker-entrypoint-initdb.d/03_feature_row_sharadar.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rl_user -d alpaca_rl"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: alpaca_rl_minio_test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: alpaca_rl_minio_test_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/alpaca-rl-artifacts;
        exit 0;
      "

  feature-builder:
    build:
      context: ../../
      dockerfile: services/feature-builder/Dockerfile
    container_name: alpaca_rl_feature_builder_test
    environment:
      DATABASE_URL: postgresql://rl_user:rl_pass@postgres:5432/alpaca_rl
      FEATURE_BUILDER_PORT: 8002
    ports:
      - "18002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  dataset-builder:
    build:
      context: ../../
      dockerfile: services/dataset-builder/Dockerfile
    container_name: alpaca_rl_dataset_builder_test
    environment:
      DATABASE_URL: postgresql://rl_user:rl_pass@postgres:5432/alpaca_rl
      DATASET_BUILDER_PORT: 8003
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpaca-rl-artifacts
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    ports:
      - "18003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  kaggle-orchestrator:
    build:
      context: ../../services/kaggle-orchestrator
      dockerfile: Dockerfile
    container_name: alpaca_rl_kaggle_orchestrator_test
    environment:
      DATABASE_URL: postgresql://rl_user:rl_pass@postgres:5432/alpaca_rl
      KAGGLE_ORCHESTRATOR_PORT: 8011
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpaca-rl-artifacts
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      KAGGLE_API_TOKEN: ""
      KAGGLE_USERNAME: ""
    ports:
      - "18011:8011"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
